name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to keep feedback fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'

jobs:
  web:
    name: web (typecheck, lint, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

  db:
    name: db (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: db/package-lock.json

      - run: npm ci

      - run: npm test

  market:
    name: market (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/market
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/market/package-lock.json

      - run: npm ci

      - run: npm test

  resolver:
    name: resolver (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/resolver/package-lock.json

      # Resolver tests invoke `npm run apply:schema` inside db/, so the db
      # workspace needs its dependencies installed too.
      - name: Install db deps (needed by resolver integration harness)
        working-directory: db
        run: npm ci

      - name: Install resolver deps
        working-directory: services/resolver
        run: npm ci

      - name: Run resolver tests
        working-directory: services/resolver
        run: npm test

  dev-api:
    name: dev-api (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/dev-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/dev-api/package-lock.json

      - run: npm ci

      - run: npm test

  watchlists:
    name: watchlists (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/watchlists/package-lock.json

      # Watchlists tests invoke `npm run apply:schema` inside db/, so the db
      # workspace needs its dependencies installed too.
      - name: Install db deps (needed by watchlists integration harness)
        working-directory: db
        run: npm ci

      - name: Install watchlists deps
        working-directory: services/watchlists
        run: npm ci

      - name: Run watchlists tests
        working-directory: services/watchlists
        run: npm test
