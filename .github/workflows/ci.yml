name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to keep feedback fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22.19.0'

jobs:
  web:
    name: web (typecheck, lint, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

  db:
    name: db (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: db/package-lock.json

      - run: npm ci

      - run: npm test

  market:
    name: market (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/market
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/market/package-lock.json

      - run: npm ci

      - run: npm test

  home:
    name: home (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/home
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/home/package-lock.json

      - run: npm ci

      - run: npm test

  resolver:
    name: resolver (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            db/package-lock.json
            services/resolver/package-lock.json

      # Resolver tests invoke `npm run apply:schema` inside db/, so the db
      # workspace needs its dependencies installed too.
      - name: Install db deps (needed by resolver integration harness)
        working-directory: db
        run: npm ci

      - name: Install resolver deps
        working-directory: services/resolver
        run: npm ci

      - name: Run resolver tests
        working-directory: services/resolver
        run: npm test

  screener-artifacts:
    name: screener-artifacts (integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            db/package-lock.json
            services/screener-artifacts/package-lock.json

      # The ETL integration test imports the shared db/test Docker harness and
      # invokes `npm run seed` inside db/, so db dependencies must be present.
      - name: Install db deps (needed by screener-artifacts integration harness)
        working-directory: db
        run: npm ci

      - name: Install screener-artifacts deps
        working-directory: services/screener-artifacts
        run: npm ci

      - name: Run screener-artifacts tests
        working-directory: services/screener-artifacts
        run: npm test

  dev-api:
