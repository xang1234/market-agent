          format: uuid
        agent_id:
          type: string
          format: uuid
        stage:
          type: string
        subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
        source_refs:
          type: array
          items:
            type: string
            format: uuid
        summary:
          type: string
        ts:
          type: string
          format: date-time
    HomeFeedItem:
      type: object
      properties:
        item_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [finding, cluster]
        headline:
          type: string
        summary:
          type: string
        severity:
          type: string
        subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
        source_refs:
          type: array
          items:
            type: string
            format: uuid
        ts:
          type: string
          format: date-time
    WatchlistInput:
      type: object
      required: [name, mode]
      properties:
        name:
          type: string
        mode:
          type: string
          enum: [manual, screen, agent, theme, portfolio]
        membership_spec:
          type: object
          additionalProperties: true
    Watchlist:
      allOf:
        - $ref: '#/components/schemas/WatchlistInput'
        - type: object
          required: [watchlist_id, is_default, created_at, updated_at]
          properties:
            watchlist_id:
              type: string
              format: uuid
            is_default:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    WatchlistMember:
      type: object
      required: [subject_ref, created_at]
      properties:
        subject_ref:
          $ref: '#/components/schemas/SubjectRef'
        created_at:
          type: string
          format: date-time
    AddWatchlistMemberResponse:
      type: object
      required: [status, member]
      properties:
        status:
          type: string
          enum: [created, already_present]
        member:
          $ref: '#/components/schemas/WatchlistMember'
    ChatThread:
      type: object
      required: [thread_id, user_id, created_at, updated_at]
      properties:
        thread_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        primary_subject_ref:
          # anyOf rather than oneOf because openapi-typescript drops the null
          # branch from a oneOf nullable $ref (issue #1215), silently producing
          # a non-nullable type for codegen consumers. anyOf is semantically
          # equivalent here — SubjectRef and null are disjoint — and is
          # handled correctly by current openapi-typescript versions.
          anyOf:
            - $ref: '#/components/schemas/SubjectRef'
            - type: 'null'
        title:
          type: ['string', 'null']
        latest_snapshot_id:
          type: ['string', 'null']
          format: uuid
        archived_at:
          type: ['string', 'null']
          format: date-time
          description: When the thread was archived (soft-deleted), or null if active.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChatMessage:
      type: object
      required: [message_id, thread_id, role, snapshot_id, blocks, content_hash, created_at]
      properties:
        message_id:
          type: string
          format: uuid
        thread_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, tool]
        snapshot_id:
          type: string
          format: uuid
        blocks:
          type: array
          items:
            $ref: './finance_research_block_schema.json#/$defs/Block'
        content_hash:
          type: string
        created_at:
          type: string
          format: date-time
