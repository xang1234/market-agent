        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_ref]
              properties:
                subject_ref:
                  $ref: '#/components/schemas/SubjectRef'
      responses:
        '201':
          description: Member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWatchlistMemberResponse'
        '200':
          description: Member already present (idempotent repeat)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWatchlistMemberResponse'
        '400':
          description: Malformed subject_ref
        '401':
          description: Missing or malformed user credential
