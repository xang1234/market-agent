          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        snapshot_id:
          type: string
          format: uuid
        headline:
          type: string
        severity:
          type: string
        subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
        summary_blocks:
          type: array
