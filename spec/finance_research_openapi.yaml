  /v1/screener/screens/{screenId}:
    get:
      tags: [Screener]
      summary: Get a saved screen
      operationId: getSavedScreen
      parameters:
        - in: path
          name: screenId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Saved screen
    delete:
      tags: [Screener]
      summary: Delete a saved screen
      operationId: deleteSavedScreen
      parameters:
        - in: path
          name: screenId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Screen deleted
  /v1/screener/screens/{screenId}/replay:
    post:
      tags: [Screener]
      summary: Replay a saved screen query
      operationId: replaySavedScreen
      parameters:
        - in: path
          name: screenId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Screen results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/themes/membership-rationales:
    get:
      tags: [Themes]
      summary: List theme membership rationale for a subject
      operationId: listThemeMembershipRationales
      parameters:
        - $ref: '#/components/parameters/SubjectKindQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - in: query
          name: as_of
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Theme membership rationale rows
          content:
            application/json:
              schema:
                type: object
                required: [memberships, truncated]
                properties:
                  memberships:
                    type: array
                    items:
                      $ref: '#/components/schemas/ThemeMembershipRationale'
                  truncated:
                    type: boolean
  /v1/dev/placeholders:
    get:
      tags: [Dev]
      summary: List enabled dev placeholder surfaces
      operationId: listDevPlaceholders
      description: Internal dev API route; not part of production product behavior.
      responses:
        '200':
          description: Dev placeholders
  /v1/dev/services:
    get:
      tags: [Dev]
      summary: List local dev service routing inventory
      operationId: listDevServices
      description: Internal dev API route documenting local stack routing.
      responses:
        '200':
          description: Dev service catalog
components:
  parameters:
    SubjectKindQuery:
      in: query
      name: subject_kind
      required: true
      schema:
        $ref: '#/components/schemas/SubjectKind'
    SubjectIdQuery:
      in: query
      name: subject_id
      required: true
      schema:
        type: string
        format: uuid
    ReviewIdPath:
      in: path
      name: reviewId
      required: true
      schema:
        type: string
        format: uuid
    PortfolioIdPath:
      in: path
      name: portfolioId
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SubjectKind:
      type: string
      description: Canonical subject discriminator. Commodity public contracts use commodities market-stack subjects; legacy finance subjects remain readable during migration.
      enum: [commodity, benchmark, contract, curve, region, delivery_point, asset, producer, route, market_theme, portfolio, screen, issuer, instrument, listing, theme, macro_topic]
    SubjectRef:
      $ref: './finance_research_block_schema.json#/$defs/SubjectRef'
    CommodityMarketSubjectRef:
      type: object
      required: [kind, id]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [benchmark, contract]
        id:
          type: string
          format: uuid
    CommodityRef:
      type: object
      required: [kind, id]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [commodity]
        id:
          type: string
          format: uuid
    CurveRef:
      type: object
      required: [kind, id]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [curve]
        id:
          type: string
          format: uuid
    DelayClass:
      type: string
      enum: [real_time, delayed_15m, eod, unknown]
    DecisionHorizon:
      type: string
      enum: [1d, 1w, 1m, 3m]
    ImpactChannel:
      type: string
      enum: [supply, demand, inventory, curve_structure, freight, policy, macro_fx, weather, disruption]
    ImpactDirection:
      type: string
      enum: [positive, negative, mixed, unknown]
    ImpactDriverType:
      type: string
      enum: [price_move, report_delta, news_event, inventory_change, forecast_change, internal_note]
    CommodityMarketQuote:
      type: object
      required:
        - subject_ref
        - benchmark
        - price
        - prev_close
        - currency
        - unit
        - grade
        - location
        - delivery_month
        - incoterm
        - freshness
        - as_of
        - source_id
        - change_abs
        - change_pct
      additionalProperties: false
      properties:
        subject_ref:
          $ref: '#/components/schemas/CommodityMarketSubjectRef'
        benchmark:
          type: string
        price:
          type: number
        prev_close:
          type: number
        currency:
          type: string
        unit:
          type: string
        grade:
          type: string
        location:
          type: string
        delivery_month:
          type: string
        incoterm:
          type: string
          enum: [warehouse, fob, cfr, cif, dap]
        freshness:
          $ref: '#/components/schemas/DelayClass'
        as_of:
          type: string
          format: date-time
        source_id:
          type: string
          format: uuid
        change_abs:
          type: number
        change_pct:
          type: number
    CommodityLatestResponse:
      type: object
      required: [quote, source_freshness]
      additionalProperties: false
      properties:
        quote:
          $ref: '#/components/schemas/CommodityMarketQuote'
        source_freshness:
          type: object
          required: [source_id, delay_class, as_of]
          additionalProperties: false
          properties:
            source_id:
              type: string
              format: uuid
            delay_class:
              $ref: '#/components/schemas/DelayClass'
            as_of:
              type: string
              format: date-time
    CommoditySeriesPoint:
      type: object
      required: [ts, price]
      additionalProperties: false
      properties:
        ts:
          type: string
          format: date-time
        price:
          type: number
    CommoditySeriesResponse:
      type: object
      required: [subject_ref, currency, unit, points, source_id, as_of]
      additionalProperties: false
      properties:
        subject_ref:
          $ref: '#/components/schemas/CommodityMarketSubjectRef'
        currency:
          type: string
        unit:
          type: string
        points:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CommoditySeriesPoint'
        source_id:
          type: string
          format: uuid
        as_of:
          type: string
          format: date-time
    CommodityCurvePoint:
      type: object
      required: [tenor, tenor_rank, price]
      additionalProperties: false
      properties:
        tenor:
          type: string
        tenor_rank:
          type: integer
          minimum: 0
        price:
          type: number
    CommodityCurve:
      type: object
      required: [curve_ref, as_of, currency, unit, source_id, points]
      additionalProperties: false
      properties:
        curve_ref:
          $ref: '#/components/schemas/CurveRef'
        as_of:
          type: string
          format: date-time
        currency:
          type: string
        unit:
          type: string
        source_id:
          type: string
          format: uuid
        points:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CommodityCurvePoint'
    CommodityCurveResponse:
      type: object
      required: [curve]
      additionalProperties: false
      properties:
        curve:
          $ref: '#/components/schemas/CommodityCurve'
    CommoditySpreadLeg:
      type: object
      required: [tenor, price]
      additionalProperties: false
      properties:
        tenor:
          type: string
        price:
          type: number
    CommoditySpread:
      type: object
      required: [spread_id, first_leg, second_leg, currency, unit, as_of, source_id, label, value]
      additionalProperties: false
      properties:
        spread_id:
          type: string
        first_leg:
          $ref: '#/components/schemas/CommoditySpreadLeg'
        second_leg:
          $ref: '#/components/schemas/CommoditySpreadLeg'
        currency:
          type: string
        unit:
          type: string
        as_of:
          type: string
          format: date-time
        source_id:
          type: string
          format: uuid
        label:
          type: string
        value:
          type: number
    CommoditySpreadsResponse:
      type: object
      required: [curve_ref, spreads]
      additionalProperties: false
      properties:
        curve_ref:
          $ref: '#/components/schemas/CurveRef'
        spreads:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CommoditySpread'
    CommodityInventoryPoint:
      type: object
      required: [ts, value]
      additionalProperties: false
      properties:
        ts:
          type: string
          format: date-time
        value:
          type: number
    CommodityInventoryResponse:
      type: object
      required: [commodity_ref, unit, points, source_id, as_of]
      additionalProperties: false
      properties:
        commodity_ref:
          $ref: '#/components/schemas/CommodityRef'
        unit:
          type: string
        points:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CommodityInventoryPoint'
        source_id:
          type: string
          format: uuid
        as_of:
          type: string
          format: date-time
    BalanceComponent:
      type: object
      required: [channel, label, value, delta, horizon, confidence]
      additionalProperties: false
      properties:
        channel:
          type: string
          enum: [mine_supply, disruption, inventory, port_stock, smelter_margin, steel_margin, trade_flow, freight, house_forecast]
        label:
          type: string
        value:
          type: number
        delta:
          type: number
        horizon:
          $ref: '#/components/schemas/DecisionHorizon'
        confidence:
          type: number
          minimum: 0
          maximum: 1
    BalanceSnapshot:
      type: object
      required: [commodity_ref, as_of, unit, source_refs, components, net_delta]
      additionalProperties: false
      properties:
        commodity_ref:
          $ref: '#/components/schemas/CommodityRef'
        as_of:
          type: string
          format: date-time
        unit:
          type: string
        source_refs:
          type: array
          items:
            type: string
            format: uuid
        components:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/BalanceComponent'
        net_delta:
          type: number
    BalanceSnapshotResponse:
      type: object
      required: [snapshot]
      additionalProperties: false
      properties:
        snapshot:
          $ref: '#/components/schemas/BalanceSnapshot'
    BalanceChange:
      type: object
      required: [channel, label, delta, horizon, confidence]
      additionalProperties: false
      properties:
        channel:
          type: string
        label:
          type: string
        delta:
          type: number
        horizon:
          $ref: '#/components/schemas/DecisionHorizon'
        confidence:
          type: number
          minimum: 0
          maximum: 1
    BalanceChangesResponse:
      type: object
      required: [changes]
      additionalProperties: false
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/BalanceChange'
    CommodityMarketEvent:
      type: object
      required: [event_id, occurred_at, subject_refs, source_refs, summary]
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date-time
        subject_refs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SubjectRef'
        source_refs:
          type: array
          items:
            type: string
            format: uuid
        summary:
          type: string
    ImpactEventsResponse:
      type: object
      required: [events]
      additionalProperties: false
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/CommodityMarketEvent'
    ImpactDriver:
      type: object
      required: [driver_id, subject_refs, event_refs, claim_refs, channel, direction, horizon, driver_type, confidence, magnitude, summary, priority_score]
      additionalProperties: false
      properties:
        driver_id:
          type: string
        subject_refs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SubjectRef'
        event_refs:
          type: array
          items:
            type: string
            format: uuid
        claim_refs:
          type: array
          items:
            type: string
            format: uuid
        channel:
          $ref: '#/components/schemas/ImpactChannel'
        direction:
          $ref: '#/components/schemas/ImpactDirection'
        horizon:
          $ref: '#/components/schemas/DecisionHorizon'
        driver_type:
          $ref: '#/components/schemas/ImpactDriverType'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        magnitude:
          type: number
          minimum: 0
          maximum: 1
        summary:
          type: string
        priority_score:
          type: number
    ImpactDriversResponse:
      type: object
      required: [drivers]
      additionalProperties: false
      properties:
        drivers:
          type: array
          items:
            $ref: '#/components/schemas/ImpactDriver'
    ImpactGraphNode:
      type: object
      required: [id, kind, label]
      additionalProperties: false
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [event, driver, commodity]
        label:
          type: string
    ImpactGraphEdge:
      type: object
      required: [from, to]
      additionalProperties: false
      properties:
        from:
          type: string
        to:
          type: string
        channel:
          $ref: '#/components/schemas/ImpactChannel'
        direction:
          $ref: '#/components/schemas/ImpactDirection'
        horizon:
          $ref: '#/components/schemas/DecisionHorizon'
        confidence:
          type: number
          minimum: 0
          maximum: 1
    ImpactGraphResponse:
      type: object
      required: [nodes, edges]
      additionalProperties: false
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ImpactGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ImpactGraphEdge'
    DailyCallBrief:
      type: object
      required: [brief_id, snapshot_id, status, as_of, commodity_refs, narrative, driver_ids, watch_items, horizons, requires_analyst_signoff]
      additionalProperties: false
      properties:
        brief_id:
          type: string
          format: uuid
        snapshot_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, published]
        as_of:
          type: string
          format: date-time
        commodity_refs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CommodityRef'
        narrative:
          type: string
        driver_ids:
          type: array
          minItems: 1
          items:
            type: string
        watch_items:
          type: array
          items:
            type: string
        horizons:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DecisionHorizon'
        requires_analyst_signoff:
          type: boolean
        reviewer_user_id:
          type: string
          format: uuid
        published_at:
          type: string
          format: date-time
    DailyBriefResponse:
      type: object
      required: [brief]
      additionalProperties: false
      properties:
        brief:
          $ref: '#/components/schemas/DailyCallBrief'
    BriefOutcome:
      type: object
      required: [horizon, observed_at, call_direction, realized_move, notes]
      additionalProperties: false
      properties:
        horizon:
          $ref: '#/components/schemas/DecisionHorizon'
        observed_at:
          type: string
          format: date-time
        call_direction:
          $ref: '#/components/schemas/ImpactDirection'
        realized_move:
          type: number
        notes:
          type: string
    BriefOutcomesResponse:
      type: object
      required: [brief_id, outcomes]
      additionalProperties: false
      properties:
        brief_id:
          type: string
          format: uuid
        outcomes:
          type: array
          items:
            $ref: '#/components/schemas/BriefOutcome'
    LegacyListingRef:
      type: object
      required: [kind, id]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [listing]
        id:
          type: string
          format: uuid
    LegacyNormalizedQuote:
      type: object
      required: [listing, price, prev_close, change_abs, change_pct, session_state, as_of, delay_class, currency, source_id]
      additionalProperties: false
      properties:
        listing:
          $ref: '#/components/schemas/LegacyListingRef'
        price:
          type: number
        prev_close:
          type: number
        change_abs:
          type: number
        change_pct:
          type: number
        session_state:
          type: string
          enum: [pre_market, regular, post_market, closed]
        as_of:
          type: string
          format: date-time
        delay_class:
          $ref: '#/components/schemas/DelayClass'
        currency:
          type: string
        source_id:
          type: string
          format: uuid
    LegacyQuoteResponse:
      type: object
      required: [quote, provenance, listing_context]
      additionalProperties: false
      properties:
        quote:
          $ref: '#/components/schemas/LegacyNormalizedQuote'
        provenance:
          type: object
          required: [provider, source_id, delay_class, as_of]
          additionalProperties: false
          properties:
            provider:
              type: string
            source_id:
              type: string
              format: uuid
            delay_class:
              $ref: '#/components/schemas/DelayClass'
            as_of:
              type: string
              format: date-time
        listing_context:
          type: object
          required: [ticker, mic, timezone]
          additionalProperties: false
          properties:
            ticker:
              type: string
            mic:
              type: string
            timezone:
              type: string
    ThemeMembershipRationale:
      type: object
      required:
        - theme_id
        - theme_name
        - theme_description
        - membership_mode
        - score
        - rationale_supported
        - rationale_claim_ids
      properties:
        theme_id:
          type: string
          format: uuid
        theme_name:
          type: string
        theme_description:
          type:
            - string
            - 'null'
        membership_mode:
          type: string
          enum: [manual, rule_based, inferred]
        score:
          type:
            - number
            - 'null'
        rationale_supported:
          type: boolean
          description: True when the product should render rationale_claim_ids for this membership.
        rationale_claim_ids:
          type: array
          items:
            type: string
            format: uuid
    ResolvedSubject:
      type: object
      description: Resolver result carrying a canonical subject reference, hydrated handoff context when resolved, plus any lower-confidence alternatives.
      properties:
        subject_ref:
          $ref: '#/components/schemas/SubjectRef'
        display_name:
          type: string
          description: Backward-compatible display label alias.
        confidence:
          type: number
        identity_level:
          $ref: '#/components/schemas/SubjectKind'
        display_label:
          type: string
        display_labels:
          type: object
          properties:
            primary:
              type: string
            legal_name:
              type: string
            ticker:
              type: string
            mic:
              type: string
            share_class:
              type: string
        normalized_input:
          type: string
        resolution_path:
          type: string
          enum: [auto_advanced, explicit_choice, direct_ref]
        context:
          type: object
          description: Entry context for issuer, instrument, listing, or active listing details. Persist only subject_ref.
          additionalProperties: true
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
    Fact:
      type: object
      description: Facts are the unit of truth for displayed values.
      properties:
        fact_id:
          type: string
          format: uuid
        metric_key:
          type: string
        value_num:
          type: number
        value_text:
          type: string
        unit:
          type: string
        currency:
          type: string
        as_of:
          type: string
          format: date-time
        source_id:
          type: string
          format: uuid
        verification_status:
          type: string
        freshness_class:
          type: string
        coverage_level:
          type: string
    FactListResponse:
      type: object
      properties:
        facts:
          type: array
          items:
            $ref: '#/components/schemas/Fact'
    SeriesPoint:
      type: object
      required: [x, y]
      properties:
        x:
          type: string
          format: date-time
        y:
          type: number
    SeriesRange:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
    SeriesQuery:
      type: object
      required: [subject_refs, range, interval, basis, normalization]
      properties:
        subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
        range:
          $ref: '#/components/schemas/SeriesRange'
        interval:
          type: string
        basis:
          type: string
        normalization:
          type: string
    SeriesItem:
      type: object
      required: [listing, points, coverage_start, coverage_end, coverage_level]
      properties:
        listing:
          $ref: '#/components/schemas/SubjectRef'
        name:
          type: string
          description: Optional display label; clients must use listing for identity.
        points:
          type: array
          items:
            $ref: '#/components/schemas/SeriesPoint'
        coverage_start:
          type:
            - string
            - 'null'
          format: date-time
          description: First effective point timestamp for this subject, or null when unavailable.
        coverage_end:
          type:
            - string
            - 'null'
          format: date-time
          description: Last effective point timestamp for this subject, or null when unavailable.
        coverage_level:
          type: string
          enum: [full, partial, unavailable]
        unavailable_reason:
          type: string
          enum: [provider_error, missing_coverage, rate_limited, stale_data]
    SeriesResponse:
      type: object
      required: [query, snapshot_compatible, as_of, series]
      properties:
        query:
          $ref: '#/components/schemas/SeriesQuery'
        snapshot_compatible:
          type: boolean
        as_of:
          type: string
          format: date-time
        series:
          type: array
          items:
            $ref: '#/components/schemas/SeriesItem'
    Claim:
      type: object
      description: Claims are extracted assertions from evidence, not canonical truth.
      properties:
        claim_id:
          type: string
          format: uuid
        predicate:
          type: string
        text_canonical:
          type: string
        polarity:
          type: string
        modality:
          type: string
        confidence:
          type: number
        status:
          type: string
    Event:
      type: object
      description: Events are state changes assembled from claims and source references.
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        status:
          type: string
    Document:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        kind:
          type: string
        title:
          type: string
        author:
          type: string
        published_at:
          type: string
          format: date-time
        parse_status:
          type: string
    EvidenceInspectionRequest:
      type: object
      required: [snapshot_id, ref]
      additionalProperties: false
      properties:
        snapshot_id:
          type: string
          format: uuid
        ref:
          $ref: '#/components/schemas/EvidenceInspectionRef'
    EvidenceInspectionRef:
      type: object
      required: [kind, id]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [source, document, claim, event, fact]
        id:
          type: string
          format: uuid
    EvidenceInspectionRow:
      type: object
      required: [label, value]
      additionalProperties: false
      properties:
        label:
          type: string
        value:
          type: string
    EvidenceInspectionLink:
      type: object
      required: [label, href]
      additionalProperties: false
      properties:
        label:
          type: string
        href:
          type: string
          format: uri
    EvidenceInspection:
      type: object
      required:
        - snapshot_id
        - ref
        - kind
        - title
        - subtitle
        - badges
        - rows
        - links
        - related_refs
      additionalProperties: false
      properties:
        snapshot_id:
          type: string
          format: uuid
        ref:
          $ref: '#/components/schemas/EvidenceInspectionRef'
        kind:
          type: string
          enum: [source, document, claim, event, fact]
        title:
          type: string
        subtitle:
          type:
            - string
            - 'null'
        badges:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceInspectionRow'
        links:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceInspectionLink'
        related_refs:
          type: array
          description: Navigation refs filtered to the same sealed snapshot.
          items:
            $ref: '#/components/schemas/EvidenceInspectionRef'
    SnapshotManifest:
      type: object
      description: Snapshot manifests seal the exact fact, claim, event, and source references that support an answer or finding at a specific as_of.
      properties:
        snapshot_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
        fact_refs:
          type: array
          items:
            type: string
            format: uuid
        claim_refs:
          type: array
          items:
            type: string
            format: uuid
        event_refs:
          type: array
          items:
            type: string
            format: uuid
        document_refs:
          type: array
          items:
            type: string
            format: uuid
        series_specs:
          type: array
          items:
            type: object
            additionalProperties: true
        as_of:
          type: string
          format: date-time
        basis:
          type: string
        normalization:
          type: string
        coverage_start:
          type: string
          format: date-time
        source_ids:
          type: array
          items:
            type: string
            format: uuid
        tool_call_ids:
          type: array
          items:
            type: string
            format: uuid
        tool_call_result_hashes:
          type: array
          items:
            type: object
            required: [tool_call_id, result_hash]
            properties:
              tool_call_id:
                type: string
                format: uuid
              result_hash:
                type: string
        allowed_transforms:
          type: object
          additionalProperties: true
    SnapshotRefreshRequiredError:
      type: object
      required: [error, refresh_required]
      properties:
        error:
          type: string
          const: refresh_required
        refresh_required:
          type: object
          required: [reason]
          properties:
            reason:
              type: string
              enum: [basis, normalization, peer_set, freshness, transform]
    BlockEnvelope:
      type: object
      properties:
        blocks:
          type: array
          items:
            $ref: './finance_research_block_schema.json#/$defs/Block'
    AnalyzePlaybookSection:
      type: object
      required: [section_id, title, required, block_hint]
      properties:
        section_id:
          type: string
        title:
          type: string
        required:
          type: boolean
        block_hint:
          type: string
          enum: [rich_text, metric_row, table, line_chart, section, daily_call_summary, driver_board, curve_chart, spread_table, inventory_bridge, impact_matrix, report_delta, watch_item_table, forecast_vs_market]
    AnalyzePlaybook:
      type: object
      required:
        - playbook_id
        - version
        - name
        - description
        - default_instructions
        - default_source_categories
        - sections
      properties:
        playbook_id:
          type: string
        version:
          type: integer
        name:
          type: string
        description:
          type: string
        default_instructions:
          type: string
        default_source_categories:
          type: array
          items:
            type: string
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AnalyzePlaybookSection'
    AnalyzePlaybookListResponse:
      type: object
      required: [playbooks]
      properties:
        playbooks:
          type: array
          items:
            $ref: '#/components/schemas/AnalyzePlaybook'
    AnalyzeRunInput:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: string
          format: uuid
          description: Template identifier selected from /v1/analyze/templates.
        playbook_id:
          type: string
          description: Optional guided playbook id. This never substitutes for template_id.
        instructions:
          type: string
          description: User instructions to apply while rendering the memo.
        source_categories:
          type: array
          items:
            type: string
        subject_ref:
          anyOf:
            - $ref: '#/components/schemas/SubjectRef'
            - type: 'null'
        primary_subject_ref:
          description: Backward-compatible alias for subject_ref.
          anyOf:
            - $ref: '#/components/schemas/SubjectRef'
            - type: 'null'
    AnalyzeRunMetadataSubjectRef:
      type: object
      required: [kind, id]
      properties:
        kind:
          type: string
        id:
          type: string
    AnalyzeRunMetadataV1:
      type: object
      required:
        - schema_version
        - template_id
        - template_version
        - playbook_id
        - playbook_version
        - instructions
        - source_categories
        - subject_refs
      properties:
        schema_version:
          type: integer
          enum: [1]
        template_id:
          type: string
          format: uuid
        template_version:
          type: integer
        playbook_id:
          type:
            - string
            - 'null'
        playbook_version:
          type:
            - integer
            - 'null'
        instructions:
          type: string
        source_categories:
          type: array
          items:
            type: string
        subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/AnalyzeRunMetadataSubjectRef'
        rerun_of_run_id:
          type: string
          format: uuid
    AnalyzeRunMetadata:
      description: Versioned Analyze run metadata. Legacy malformed metadata remains viewable but is not rerunnable.
      anyOf:
        - $ref: '#/components/schemas/AnalyzeRunMetadataV1'
        - type: object
          additionalProperties: true
    AnalyzeRunSummary:
      type: object
      description: Lightweight run-history row. It intentionally omits blocks and raw run metadata.
      required:
        - run_id
        - template_id
        - template_name
        - template_version
        - playbook_id
        - playbook_name
        - playbook_version
        - display_title
        - can_rerun
        - rerun_unavailable_reason
        - snapshot_id
        - created_at
      properties:
        run_id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        template_name:
          type: string
        template_version:
          type: integer
        playbook_id:
          type:
            - string
            - 'null'
        playbook_name:
          type:
            - string
            - 'null'
        playbook_version:
          type:
            - integer
            - 'null'
        display_title:
          type: string
        can_rerun:
          type: boolean
        rerun_unavailable_reason:
          type:
            - string
            - 'null'
        snapshot_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    AnalyzeRun:
      allOf:
        - $ref: '#/components/schemas/AnalyzeRunSummary'
        - type: object
          required: [run_metadata, blocks]
          properties:
            run_metadata:
              $ref: '#/components/schemas/AnalyzeRunMetadata'
            blocks:
              type: array
              items:
                $ref: './finance_research_block_schema.json#/$defs/Block'
    AnalyzeRunListResponse:
      type: object
      required: [runs, next_cursor]
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/AnalyzeRunSummary'
        next_cursor:
          type:
            - string
            - 'null'
    AnalyzeRunShareInput:
      type: object
      properties:
        source_kind:
          type: string
          enum: [memo]
        title:
          type: string
        primary_subject_ref:
          anyOf:
            - $ref: '#/components/schemas/SubjectRef'
            - type: 'null'
    AnalyzeRunShareResult:
      type: object
      required: [thread, message, origin_snapshot_ids]
      properties:
