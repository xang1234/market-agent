openapi: 3.1.0
info:
  title: Finance Research App API
  version: 1.0.0
  description: Core contracts for subjects, market, fundamentals, evidence, snapshots, chat, analyze, agents, home, watchlists, and screener. The /v1 API is the client-facing backend-for-frontend surface.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
# Contract rule: Clients must not call third-party providers directly.
tags:
  - name: Subjects
  - name: Market
  - name: Fundamentals
  - name: Evidence
  - name: Snapshots
  - name: Chat
  - name: Analyze
  - name: Agents
  - name: Themes
  - name: Home
  - name: Portfolios
  - name: RunActivity
  - name: Watchlists
  - name: Screener
  - name: Dev
paths:
  /v1/subjects/resolve:
    post:
      tags: [Subjects]
      summary: Resolve free-text into subject candidates
      operationId: resolveSubjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                allow_kinds:
                  type: array
                  items:
                    $ref: '#/components/schemas/SubjectKind'
                choice:
                  type: object
                  description: Explicit candidate choice to hydrate after an ambiguous resolution.
                  required: [subject_ref]
                  properties:
                    subject_ref:
                      $ref: '#/components/schemas/SubjectRef'
      responses:
        '200':
          description: Resolved subject candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjects:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResolvedSubject'
                  unresolved:
                    type: array
                    items:
                      type: string
  /v1/subjects/hydrate:
    post:
      tags: [Subjects]
      summary: Hydrate a persisted subject reference with resolver context
      operationId: hydrateSubject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_ref]
              properties:
                subject_ref:
                  $ref: '#/components/schemas/SubjectRef'
      responses:
        '200':
          description: Hydrated subject context for direct navigation or persisted references
          content:
            application/json:
              schema:
                type: object
                required: [subject]
                properties:
                  subject:
                    $ref: '#/components/schemas/ResolvedSubject'
        '404':
          description: Subject reference does not exist
  /v1/markets/latest:
    get:
      tags: [Market]
      summary: Get latest normalized commodity benchmark or contract price
      operationId: getCommodityLatest
      parameters:
        - in: query
          name: subject_kind
          required: true
          schema:
            type: string
            enum: [benchmark, contract]
        - in: query
          name: subject_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Latest commodity quote with unit, currency, freshness, grade, location, delivery month, and incoterm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityLatestResponse'
  /v1/markets/series:
    get:
      tags: [Market]
      summary: Get normalized commodity market series
      operationId: getCommoditySeries
      parameters:
        - in: query
          name: subject_kind
          required: true
          schema:
            type: string
            enum: [benchmark, contract]
        - in: query
          name: subject_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Commodity series response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommoditySeriesResponse'
  /v1/markets/curve:
    get:
      tags: [Market]
      summary: Get normalized commodity curve
      operationId: getCommodityCurve
      parameters:
        - in: query
          name: curve_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Commodity curve response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityCurveResponse'
  /v1/markets/spreads:
    get:
      tags: [Market]
      summary: Get configured commodity spreads
      operationId: getCommoditySpreads
      parameters:
        - in: query
          name: curve_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Commodity spread response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommoditySpreadsResponse'
  /v1/markets/inventory:
    get:
      tags: [Market]
      summary: Get commodity inventory series
      operationId: getCommodityInventory
      parameters:
        - in: query
          name: commodity_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Commodity inventory response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityInventoryResponse'
  /v1/market/quote:
    get:
      tags: [Market]
      summary: Get a normalized legacy listing quote
      operationId: getLegacyListingQuote
      deprecated: true
      parameters:
        - in: query
          name: subject_kind
          required: true
          schema:
            type: string
            enum: [listing]
        - in: query
          name: subject_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Provider-normalized listing quote with display listing context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyQuoteResponse'
  /v1/market/series:
    post:
      tags: [Market]
      summary: Get a normalized legacy listing time series
      operationId: getLegacyListingSeries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesQuery'
      responses:
        '200':
          description: Time series response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesResponse'
  /v1/balances/snapshot:
    get:
      tags: [Market]
      summary: Get supply-demand balance snapshot
      operationId: getBalanceSnapshot
      responses:
        '200':
          description: Balance snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceSnapshotResponse'
  /v1/balances/changes:
    get:
      tags: [Market]
      summary: Get material balance changes
      operationId: getBalanceChanges
      responses:
        '200':
          description: Balance changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceChangesResponse'
  /v1/impact/events:
    get:
      tags: [Evidence]
      summary: Get commodity market events
      operationId: getImpactEvents
      responses:
        '200':
          description: Impact events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactEventsResponse'
  /v1/impact/drivers:
    get:
      tags: [Evidence]
      summary: Get ranked event-impact drivers
      operationId: getImpactDrivers
      responses:
        '200':
          description: Impact drivers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactDriversResponse'
  /v1/impact/graph:
    get:
      tags: [Evidence]
      summary: Get event-impact graph
      operationId: getImpactGraph
      responses:
        '200':
          description: Event-impact graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactGraphResponse'
  /v1/briefs/daily:
    get:
      tags: [Analyze]
      summary: Get or draft the daily commodities call
      operationId: getDailyBrief
      responses:
        '200':
          description: Daily call brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyBriefResponse'
  /v1/briefs/{briefId}:
    get:
      tags: [Analyze]
      summary: Get daily call brief by id
      operationId: getBrief
      parameters:
        - in: path
          name: briefId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Brief detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyBriefResponse'
  /v1/briefs/{briefId}/publish:
    post:
      tags: [Analyze]
      summary: Publish a signed-off daily call brief
      operationId: publishBrief
      parameters:
        - in: path
          name: briefId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Published brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyBriefResponse'
  /v1/briefs/{briefId}/outcomes:
    get:
      tags: [Analyze]
      summary: Get outcome tracking for a published daily call
      operationId: getBriefOutcomes
      parameters:
        - in: path
          name: briefId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Brief outcomes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefOutcomesResponse'
  /v1/market/cache-audit:
    get:
      tags: [Market]
      summary: Inspect runtime market cache audit events
      operationId: getMarketCacheAudit
      description: Internal/dev diagnostic endpoint exposed by the market service.
      responses:
        '200':
          description: Cache audit events
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/fundamentals/profile:
    get:
      tags: [Fundamentals]
      summary: Get company profile
      operationId: getCompanyProfile
      parameters:
        - in: query
          name: subject_kind
          required: true
          schema:
            $ref: '#/components/schemas/SubjectKind'
        - in: query
          name: subject_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Company profile
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/fundamentals/statements:
    post:
      tags: [Fundamentals]
      summary: Get statement facts
      operationId: getStatementFacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_ref, statement, periods, basis]
              properties:
                subject_ref:
                  $ref: '#/components/schemas/SubjectRef'
                statement:
                  type: string
                  enum: [income, balance, cashflow]
                periods:
                  type: array
                  items:
                    type: string
                basis:
                  type: string
                  enum: [as_reported, as_restated]
      responses:
        '200':
          description: Statement facts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactListResponse'
  /v1/fundamentals/consensus:
    get:
      tags: [Fundamentals]
      summary: Get analyst consensus for an issuer
      operationId: getFundamentalsConsensus
      parameters:
        - $ref: '#/components/parameters/SubjectKindQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
      responses:
        '200':
          description: Analyst consensus envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/fundamentals/earnings:
    get:
      tags: [Fundamentals]
      summary: Get earnings events for an issuer
      operationId: getFundamentalsEarnings
      parameters:
        - $ref: '#/components/parameters/SubjectKindQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
      responses:
        '200':
          description: Earnings envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/fundamentals/holders:
    get:
      tags: [Fundamentals]
      summary: Get institutional or insider holders for an issuer
      operationId: getFundamentalsHolders
      parameters:
        - $ref: '#/components/parameters/SubjectKindQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - in: query
          name: kind
          required: true
          schema:
            type: string
            enum: [institutional, insider]
      responses:
        '200':
          description: Holders envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/fundamentals/segments:
    post:
      tags: [Fundamentals]
      summary: Get segment facts for an issuer
      operationId: getFundamentalsSegments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Segment facts envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/fundamentals/stats:
    get:
      tags: [Fundamentals]
      summary: Get key stats for an issuer
      operationId: getFundamentalsStats
      parameters:
        - $ref: '#/components/parameters/SubjectKindQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
      responses:
        '200':
          description: Key stats envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/evidence/claims/search:
    post:
      tags: [Evidence]
      summary: Search claims by subject, predicate, and time range
      operationId: searchClaims
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject_refs:
                  type: array
                  items:
                    $ref: '#/components/schemas/SubjectRef'
                predicates:
                  type: array
                  items:
                    type: string
                range:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
                trust_min:
                  type: string
                  enum: [primary, secondary, tertiary, user]
      responses:
        '200':
          description: Matching claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  claims:
                    type: array
                    items:
                      $ref: '#/components/schemas/Claim'
  /v1/evidence/events/search:
    post:
      tags: [Evidence]
      summary: Search events
      operationId: searchEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject_refs:
                  type: array
                  items:
                    $ref: '#/components/schemas/SubjectRef'
                event_types:
                  type: array
                  items:
                    type: string
                range:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
      responses:
        '200':
          description: Matching events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
  /v1/evidence/documents/{documentId}:
    get:
      tags: [Evidence]
      summary: Get document metadata and parse status
      operationId: getDocument
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
  /v1/evidence/evidence-bundles:
    post:
      tags: [Evidence]
      summary: Build an evidence bundle from claim or event refs
      operationId: buildEvidenceBundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                claim_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                event_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Evidence bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundle_id:
                    type: string
                    format: uuid
                  documents:
                    type: array
                    items:
                      $ref: '#/components/schemas/Document'
                  evidence:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/evidence/inspect:
    post:
      tags: [Evidence]
      summary: Inspect a snapshot-contained evidence reference
      operationId: inspectEvidence
      description: Returns artifact-safe details for a ref inside a sealed snapshot. The endpoint intentionally does not expose raw blob ids, content hashes, raw body text, or document bytes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceInspectionRequest'
      responses:
        '200':
          description: Artifact-safe evidence inspection
          headers:
            Cache-Control:
              description: Always `no-store`; inspection requests are user- and artifact-scoped.
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceInspection'
        '400':
          description: Malformed request body or ref
        '401':
          description: Missing or malformed user credential
        '404':
          description: Evidence is not available for this artifact. This intentionally covers missing snapshot, invisible artifact, ref absent from snapshot, missing evidence row, and entitlement denial with the same response.
          headers:
            Cache-Control:
              description: Always `no-store`; inspection requests are user- and artifact-scoped.
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    const: evidence is not available for this artifact
  /v1/evidence/healthz:
    get:
      tags: [Evidence]
      summary: Evidence service health check
      operationId: getEvidenceHealth
      description: Internal health endpoint documented for route inventory completeness.
      responses:
        '200':
          description: Evidence service health
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/evidence/fact-review-queue:
    get:
      tags: [Evidence]
      summary: List fact review queue items
      operationId: listFactReviewQueue
      parameters:
        - in: query
          name: stale_after_seconds
          required: false
          schema:
            type: integer
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Review queue items
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/evidence/fact-review-queue/{reviewId}/approve:
    post:
      tags: [Evidence]
      summary: Approve a queued fact candidate
      operationId: approveFactReview
      parameters:
        - $ref: '#/components/parameters/ReviewIdPath'
      responses:
        '200':
          description: Candidate approved
  /v1/evidence/fact-review-queue/{reviewId}/candidate:
    patch:
      tags: [Evidence]
      summary: Edit a queued fact candidate
      operationId: editFactReviewCandidate
      parameters:
        - $ref: '#/components/parameters/ReviewIdPath'
      responses:
        '200':
          description: Candidate edited
  /v1/evidence/fact-review-queue/{reviewId}/reject:
    post:
      tags: [Evidence]
      summary: Reject a queued fact candidate
      operationId: rejectFactReview
      parameters:
        - $ref: '#/components/parameters/ReviewIdPath'
      responses:
        '200':
          description: Candidate rejected
  /v1/snapshots/{snapshotId}:
    get:
      tags: [Snapshots]
      summary: Fetch a sealed snapshot manifest
      operationId: getSnapshot
      parameters:
        - in: path
          name: snapshotId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Snapshot manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotManifest'
  /v1/snapshots/{snapshotId}/transform:
    post:
      tags: [Snapshots]
      summary: Apply an allowed transform to a sealed snapshot
      description: Snapshot transforms are backend-mediated interactions over sealed snapshots.
      operationId: transformSnapshot
      parameters:
        - in: path
          name: snapshotId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transform]
              properties:
                transform:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Transformed block data or series data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          description: Transform requires refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotRefreshRequiredError'
  /v1/chat/threads:
    get:
      tags: [Chat]
      summary: List chat threads for the calling user
      operationId: listThreads
      description: |
        Returns the caller's threads ordered by `updated_at` descending. By
        default archived threads are filtered out; pass `include_archived=true`
        to receive them too.
      parameters:
        - in: query
          name: include_archived
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Chat threads
          content:
            application/json:
              schema:
                type: object
                required: [threads]
                properties:
                  threads:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatThread'
        '401':
          description: Missing or malformed user credential
    post:
      tags: [Chat]
      summary: Create a thread
      operationId: createThread
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                primary_subject_ref:
                  $ref: '#/components/schemas/SubjectRef'
                title:
                  type: ['string', 'null']
      responses:
        '201':
          description: Thread created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThread'
        '400':
          description: Malformed request body
        '401':
          description: Missing or malformed user credential
  /v1/chat/threads/{threadId}:
    patch:
      tags: [Chat]
      summary: Update a thread's title
      operationId: updateThreadTitle
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: ['string', 'null']
                  description: |
                    The new title. Pass `null` (or an empty/whitespace
                    string) to clear the title.
      responses:
        '200':
          description: Thread updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThread'
        '400':
          description: Malformed request body
        '401':
          description: Missing or malformed user credential
        '409':
          description: Idempotency key conflicts with an existing chat message
        '404':
          description: Thread not found for the calling user
    delete:
      tags: [Chat]
      summary: Archive a thread (soft-delete)
      operationId: archiveThread
      description: |
        Sets `archived_at` to the current timestamp if not already archived;
        otherwise leaves the original `archived_at` unchanged. Idempotent.
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Thread archived
        '400':
          description: Malformed thread id
        '401':
          description: Missing or malformed user credential
        '404':
          description: Thread not found for the calling user
  /v1/chat/threads/{threadId}/messages:
    get:
      tags: [Chat]
      summary: List persisted thread messages
      operationId: listThreadMessages
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Persisted user, assistant, and tool messages in creation order
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatMessage'
        '401':
          description: Missing or malformed user credential
        '404':
          description: Thread not found for the calling user
    post:
      tags: [Chat]
      summary: Persist a user message before starting or retrying a stream
      operationId: createMessage
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                message_id:
                  type: string
                  format: uuid
                  description: Optional client-generated idempotency key for retry-safe message creation.
                snapshot_id:
                  type: string
                  format: uuid
                  description: Optional client-generated snapshot id for the sealed user-input snapshot.
                content:
                  type: string
                attachments:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        '201':
          description: User message persisted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: '#/components/schemas/ChatMessage'
        '400':
          description: Malformed request body
        '401':
          description: Missing or malformed user credential
        '404':
          description: Thread not found for the calling user
  /v1/chat/threads/{threadId}/stream:
    get:
      tags: [Chat]
      summary: SSE stream for a thread run
      description: SSE chat streaming is a backend-mediated run transport. Each
        coordinator event uses the SSE `id` field as the monotonic sequence
        number and repeats `seq`, `thread_id`, `run_id`, and `turn_id` in the
        JSON payload. Reconnects may send `Last-Event-ID` to resume strictly
        after the last delivered sequence. Block events also carry `block_id`.
      operationId: streamThread
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: turn_id
          required: false
          description: Optional client-stable turn id. When omitted, `run_id`
            is used as the turn id.
          schema:
            type: string
        - in: query
          name: subject
          required: false
          description: Optional raw subject text to pre-resolve through the
            resolver before the downstream chat runner executes. Ambiguous
            subjects produce a clarification turn instead of implicit model
            selection.
          schema:
            type: string
        - in: query
          name: user_intent
          required: false
          description: Natural-language prompt text for the analyst turn. This
            is intentionally separate from `subject` so normal prompts do not
            trigger subject pre-resolution.
          schema:
            type: string
        - in: header
          name: Last-Event-ID
          required: false
          description: Last received coordinator SSE `id`; the stream resumes
            with events whose sequence is strictly greater. Values must be
            non-negative safe decimal integers already available in the stream
            history.
          schema:
            type: string
            pattern: '^(0|[1-9][0-9]*)$'
            maxLength: 16
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                default:
                  value: |
                    id: 1
                    event: turn.started
                    data: {"type":"turn.started","seq":1,"thread_id":"...","run_id":"...","turn_id":"..."}

                    id: 2
                    event: tool.started
                    data: {"type":"tool.started","seq":2,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"...","tool_name":"resolve_subjects"}

                    id: 3
                    event: tool.completed
                    data: {"type":"tool.completed","seq":3,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"...","status":"ok"}

                    id: 4
                    event: snapshot.staged
                    data: {"type":"snapshot.staged","seq":4,"thread_id":"...","run_id":"...","turn_id":"...","snapshot_id":"..."}

                    id: 5
                    event: snapshot.sealed
                    data: {"type":"snapshot.sealed","seq":5,"thread_id":"...","run_id":"...","turn_id":"...","snapshot_id":"..."}

                    id: 6
                    event: block.began
                    data: {"type":"block.began","seq":6,"thread_id":"...","run_id":"...","turn_id":"...","block_id":"b1","kind":"section"}

                    id: 7
                    event: block.delta
                    data: {"type":"block.delta","seq":7,"thread_id":"...","run_id":"...","turn_id":"...","block_id":"b1","delta":{"segment":{"type":"text","text":"Revenue grew "}}}

                    id: 8
                    event: block.completed
                    data: {"type":"block.completed","seq":8,"thread_id":"...","run_id":"...","turn_id":"...","block_id":"b1"}

                    id: 9
                    event: turn.completed
                    data: {"type":"turn.completed","seq":9,"thread_id":"...","run_id":"...","turn_id":"...","message_id":"..."}
                resolved_subject:
                  value: |
                    id: 1
                    event: turn.started
                    data: {"type":"turn.started","seq":1,"thread_id":"...","run_id":"...","turn_id":"..."}

                    id: 2
                    event: tool.started
                    data: {"type":"tool.started","seq":2,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"resolve-subjects-...","tool_name":"resolve_subjects"}

                    id: 3
                    event: tool.completed
                    data: {"type":"tool.completed","seq":3,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"resolve-subjects-...","tool_name":"resolve_subjects","status":"ok","resolution_status":"resolved","subject_ref":{"kind":"listing","id":"..."},"display_labels":{"primary":"AAPL · XNAS — Apple Inc.","ticker":"AAPL","mic":"XNAS"},"context":{"listing":{"ticker":"AAPL","mic":"XNAS"}},"handoff":{"subject_ref":{"kind":"listing","id":"..."},"identity_level":"listing","display_label":"AAPL · XNAS — Apple Inc.","resolution_path":"auto_advanced","confidence":0.95}}
                needs_clarification:
                  value: |
                    id: 1
                    event: turn.started
                    data: {"type":"turn.started","seq":1,"thread_id":"...","run_id":"...","turn_id":"..."}

                    id: 2
                    event: tool.started
                    data: {"type":"tool.started","seq":2,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"resolve-subjects-...","tool_name":"resolve_subjects"}

                    id: 3
                    event: tool.completed
                    data: {"type":"tool.completed","seq":3,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"resolve-subjects-...","tool_name":"resolve_subjects","status":"needs_clarification","resolution_status":"needs_clarification","normalized_input":"GOOG","ambiguity_axis":"multiple_listings","candidates":[{"subject_ref":{"kind":"listing","id":"..."},"display_name":"GOOG (Class C)","confidence":0.55},{"subject_ref":{"kind":"listing","id":"..."},"display_name":"GOOGL (Class A)","confidence":0.45}]}

                    id: 9
                    event: turn.completed
                    data: {"type":"turn.completed","seq":9,"thread_id":"...","run_id":"...","turn_id":"...","message_id":"...","clarification":true}
                not_found_subject:
                  value: |
                    id: 1
                    event: turn.started
                    data: {"type":"turn.started","seq":1,"thread_id":"...","run_id":"...","turn_id":"..."}

                    id: 2
                    event: tool.started
                    data: {"type":"tool.started","seq":2,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"resolve-subjects-...","tool_name":"resolve_subjects"}

                    id: 3
                    event: tool.completed
                    data: {"type":"tool.completed","seq":3,"thread_id":"...","run_id":"...","turn_id":"...","tool_call_id":"resolve-subjects-...","tool_name":"resolve_subjects","status":"not_found","resolution_status":"not_found","normalized_input":"NOTREAL","reason":"no_candidates"}

                    id: 9
                    event: turn.completed
                    data: {"type":"turn.completed","seq":9,"thread_id":"...","run_id":"...","turn_id":"...","message_id":"...","clarification":true}
        '400':
          description: Missing run_id, malformed path, or malformed Last-Event-ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '409':
          description: The requested thread/run/turn id already exists with
            different immutable turn input, such as different subject text.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
