          $ref: '#/components/schemas/ChatThread'
        message:
          type: object
          additionalProperties: true
        origin_snapshot_ids:
          type: array
          items:
            type: string
            format: uuid
    AnalyzeTemplateInput:
      type: object
      required: [name, prompt_template, source_categories]
      properties:
        name:
          type: string
        prompt_template:
          type: string
        source_categories:
          type: array
          items:
            type: string
        added_subject_refs:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRef'
        block_layout_hint:
          type: object
          additionalProperties: true
        peer_policy:
          type: object
          additionalProperties: true
        disclosure_policy:
          type: object
          additionalProperties: true
    AnalyzeTemplate:
      allOf:
        - $ref: '#/components/schemas/AnalyzeTemplateInput'
        - type: object
          properties:
            template_id:
              type: string
              format: uuid
            version:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    AgentInput:
      type: object
      required: [name, thesis, universe, cadence]
      properties:
        name:
          type: string
        thesis:
          type: string
        universe:
          $ref: '#/components/schemas/AgentUniverse'
        source_policy:
          type: object
          additionalProperties: true
        cadence:
          type: string
        prompt_template:
          type: string
        alert_rules:
          type: array
          items:
            $ref: '#/components/schemas/AgentAlertRule'
    AgentUniverse:
      oneOf:
        - type: object
          required: [mode, subject_refs]
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [static]
            subject_refs:
              type: array
              items:
                $ref: '#/components/schemas/SubjectRef'
        - type: object
          required: [mode, screen_id]
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [screen]
            screen_id:
              type: string
        - type: object
          required: [mode, theme_id]
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [theme]
            theme_id:
              type: string
        - type: object
          required: [mode, portfolio_id]
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [portfolio]
            portfolio_id:
              type: string
        - type: object
          required: [mode, agent_id]
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [agent]
            agent_id:
              type: string
    AgentAlertRule:
      type: object
      required: [rule_id]
      additionalProperties: true
      properties:
        rule_id:
          type: string
        severity_at_least:
          type: string
          enum: [low, medium, high, critical]
        headline_contains:
          type: string
        channels:
          type: array
          items:
            $ref: '#/components/schemas/NotificationChannel'
    NotificationChannel:
      type: string
      enum: [email, web_push, sms, mobile_push, digest]
    AgentPatch:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        thesis:
          type: string
        cadence:
          type: string
        universe:
          $ref: '#/components/schemas/AgentUniverse'
        alert_rules:
          type: array
          items:
            $ref: '#/components/schemas/AgentAlertRule'
        enabled:
          type: boolean
    Agent:
      allOf:
        - $ref: '#/components/schemas/AgentInput'
